name: Release Candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --junitxml=pytest-release-${{ runner.os }}.xml

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload release verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-${{ runner.os }}
          path: pytest-release-${{ runner.os }}.xml

  package-release:
    name: Package source artifacts
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archives
        run: |
          git archive --format=tar.gz --output "prometheus-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_SHA}"
          git archive --format=zip --output "prometheus-${GITHUB_REF_NAME}.zip" "${GITHUB_SHA}"

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: |
            prometheus-${{ github.ref_name }}.tar.gz
            prometheus-${{ github.ref_name }}.zip

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          name: release-bundles
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
          generate_release_notes: true
