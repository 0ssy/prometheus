name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Run pip-audit and bandit
        id: scan
        run: |
          set +e
          pip-audit -r requirements.txt --format=json --output=pip-audit.json
          PIP_AUDIT_EXIT=$?
          bandit -r . -f json -o bandit.json -x tests,web,node_modules,.venv,src-tauri/target
          BANDIT_EXIT=$?
          echo "pip_audit_exit=$PIP_AUDIT_EXIT" >> "$GITHUB_OUTPUT"
          echo "bandit_exit=$BANDIT_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            pip-audit.json
            bandit.json

      - name: Fail when security findings exist
        if: steps.scan.outputs.pip_audit_exit != '0' || steps.scan.outputs.bandit_exit != '0'
        run: |
          echo "Security scan detected findings. See artifacts."
          exit 1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
