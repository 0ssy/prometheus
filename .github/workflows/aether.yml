name: Aether AI Runtime

# Builds and tests the standalone `aether-runtime` Rust crate only. This must NOT
# invoke `cargo tauri build` (needs WebView2/NSIS/webkit2gtk) so the verified
# RC1 desktop build stays isolated. Mirrors the cross-platform matrix used by
# the Python `windows.yml` / `linux.yml` jobs.

on:
  push:
    branches: ["main", "feature/aether"]
    paths:
      - "crates/aether-runtime/**"
      - "src-tauri/Cargo.toml"
      - "src-tauri/src/lib.rs"
      - ".github/workflows/aether.yml"
  pull_request:
    paths:
      - "crates/aether-runtime/**"
      - "src-tauri/Cargo.toml"
      - "src-tauri/src/lib.rs"
      - ".github/workflows/aether.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  aether:
    name: aether-runtime (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/aether-runtime/target
          key: ${{ runner.os }}-aether-${{ hashFiles('crates/aether-runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-aether-

      - name: Build aether-runtime
        run: cargo build --manifest-path crates/aether-runtime/Cargo.toml --verbose

      - name: Test aether-runtime
        run: cargo test --manifest-path crates/aether-runtime/Cargo.toml --verbose

      - name: Check formatting
        run: cargo fmt --manifest-path crates/aether-runtime/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path crates/aether-runtime/Cargo.toml -- -D warnings
