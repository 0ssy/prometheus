name: Linux Verification

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install native HAL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libserialport-dev libudev-dev

      - name: Install Zig
        run: |
          ZIG_VERSION="0.15.1"
          ZIG_ARCHIVE="zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}" -o "${ZIG_ARCHIVE}"
          tar -xf "${ZIG_ARCHIVE}"
          echo "${PWD}/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          zig version

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77.2"

      - name: Build Zig hardware utilities
        run: zig build
        working-directory: zig

      - name: Build C/C++ HAL libraries
        run: |
          mkdir -p cpp/build
          cd cpp/build
          cmake .. -DBUILD_HAL_USB=ON -DBUILD_HAL_SERIAL=ON -DBUILD_HAL_GPIO=ON
          cmake --build . --config Release

      - name: Build Rust tensor engine
        run: cargo build -p tensor-engine --features python

      - name: Build Rust Titan engine
        run: cargo build -p titan-engine --features python

      - name: Run tests on Linux
        run: pytest --junitxml=pytest-linux.xml

      - name: Verify Triton installation
        run: |
          python -c "import triton; print('Triton', triton.__version__)"
        continue-on-error: true

      - name: Verify server health endpoint on Linux
        run: |
          python prometheus.py --server > prometheus-linux.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in $(seq 1 60); do
            if curl --silent --show-error --fail http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          echo "Server did not become healthy on Linux."
          exit 1

      - name: Upload Linux test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-linux
          path: pytest-linux.xml
