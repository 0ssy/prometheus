name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --junitxml=pytest-report.xml

      - name: Verify server health endpoint
        run: |
          python prometheus.py --server > prometheus-ci.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in $(seq 1 60); do
            if curl --silent --show-error --fail http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          echo "Server did not become healthy in CI."
          cat prometheus-ci.log
          exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Frontend typecheck
        working-directory: web
        run: npm run typecheck

      - name: Frontend lint
        working-directory: web
        run: npm run lint

      - name: Frontend build
        working-directory: web
        run: npm run build

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
