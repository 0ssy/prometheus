name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install native HAL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libserialport-dev libudev-dev

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77.2"

      - name: Build Zig hardware utilities
        run: zig build
        working-directory: zig

      - name: Build C/C++ HAL libraries
        run: |
          mkdir -p cpp/build
          cd cpp/build
          cmake .. -DBUILD_HAL_USB=ON -DBUILD_HAL_SERIAL=ON -DBUILD_HAL_GPIO=ON
          cmake --build . --config Release

      - name: Build Rust tensor engine
        run: cargo build -p tensor-engine --features python

      - name: Build Rust Titan engine
        run: cargo build -p titan-engine --features python

      - name: Run backend tests
        run: pytest --junitxml=pytest-report.xml

      - name: Verify Triton installation
        run: |
          python -c "import triton; print('Triton', triton.__version__)"
        continue-on-error: true

      - name: Verify server health endpoint
        run: |
          python prometheus.py --server > prometheus-ci.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in $(seq 1 60); do
            if curl --silent --show-error --fail http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          echo "Server did not become healthy in CI."
          cat prometheus-ci.log
          exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Frontend typecheck
        working-directory: web
        run: npm run typecheck

      - name: Frontend lint
        working-directory: web
        run: npm run lint

      - name: Frontend build
        working-directory: web
        run: npm run build

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist