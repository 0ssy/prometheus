name: macOS Verification

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-macos:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install native HAL dependencies
        run: brew install libusb libserialport pkg-config

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.1"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77.2"

      - name: Build Zig hardware utilities
        run: zig build
        working-directory: zig

      - name: Build C/C++ HAL libraries
        run: |
          mkdir -p cpp/build
          cd cpp/build
          cmake .. -DBUILD_HAL_USB=ON -DBUILD_HAL_SERIAL=ON -DBUILD_HAL_GPIO=ON
          cmake --build . --config Release

      - name: Build Rust tensor engine
        run: cargo build -p tensor-engine --features python

      - name: Build Rust Titan engine
        run: cargo build -p titan-engine --features python

      - name: Run tests on macOS
        run: pytest --junitxml=pytest-macos.xml

      - name: Verify server health endpoint on macOS
        run: |
          python prometheus.py --server > prometheus-ci.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in $(seq 1 60); do
            if curl --silent --show-error --fail http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          echo "Server did not become healthy on macOS."
          cat prometheus-ci.log
          exit 1

      - name: Upload macOS test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-macos
          path: pytest-macos.xml
