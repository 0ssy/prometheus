name: Documentation

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --accept 200,206,301,302,429 '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies for snippet checks
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate documented entry points
        run: |
          python -c "from backend.main import app; assert app is not None"
          python -c "import prometheus; assert callable(prometheus.main)"
          pytest -q tests/test_main_entrypoint.py
