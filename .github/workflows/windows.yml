name: Windows Verification

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.1"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77.2"

      - name: Build Zig hardware utilities
        run: zig build
        working-directory: zig

      - name: Build C/C++ HAL libraries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path cpp/build -Force | Out-Null
          Push-Location cpp/build
          cmake .. -DBUILD_HAL_USB=ON -DBUILD_HAL_SERIAL=ON -DBUILD_HAL_GPIO=ON
          cmake --build . --config Release
          Pop-Location

      - name: Build Rust tensor engine
        run: cargo build -p tensor-engine --features python
        shell: pwsh

      - name: Build Rust Titan engine
        run: cargo build -p titan-engine --features python
        shell: pwsh

      - name: Run tests on Windows
        run: pytest --junitxml=pytest-windows.xml

      - name: Verify server health endpoint on Windows
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "python" -ArgumentList "prometheus.py","--server" -PassThru
          try {
            $ok = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $resp = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
                if ($resp.StatusCode -eq 200) { $ok = $true; break }
              } catch {}
              Start-Sleep -Milliseconds 500
            }
            if (-not $ok) { throw "Server did not become healthy on Windows." }
          } finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id
            }
          }

      - name: Upload Windows test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-windows
          path: pytest-windows.xml
